services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: chatgpt2api:1g
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "${CHATGPT2API_PORT:-3000}:80"
    volumes:
      - ../data:/app/data
      - ../config.json:/app/config.json:ro
    environment:
      STORAGE_BACKEND: "${STORAGE_BACKEND:-json}"
      CHATGPT2API_AUTH_KEY: "${CHATGPT2API_AUTH_KEY:-}"
      CHATGPT2API_BASE_URL: "${CHATGPT2API_BASE_URL:-}"
      CHATGPT2API_OPENAI_API_KEY: "${CHATGPT2API_OPENAI_API_KEY:-}"
      MALLOC_ARENA_MAX: "2"
      PYTHONUNBUFFERED: "1"
    command:
      - uv
      - run
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "80"
      - --workers
      - "1"
      - --no-access-log
      - --timeout-keep-alive
      - "10"
    cpus: "0.85"
    mem_limit: 768m
    memswap_limit: 1536m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1/', timeout=5).read(64)\nPY"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
